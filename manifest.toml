packaging_format = 2

id = "it-tools"
name = "IT Tools"
description.en = "Collection of handy online tools for developers"
description.fr = "Collection d'outils pratiques en ligne pour les développeurs"

version = "2026.04.19~ynh2"

maintainers = ["oleole39"]

[upstream]
license = "GPL-3.0-only"
demo = "https://sharevb-it-tools.vercel.app"
code = "https://github.com/sharevb/it-tools"
fund = "https://www.buymeacoffee.com/cthmsst"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "100M"
ram.build = "20M"
ram.runtime = "20M"


[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/it-tools"

    [install.init_main_permission]
    type = "group"
    default = "visitors" 

    [install.enable_htmltopdf_server]
    type = "boolean"
    default = "true"
    ask.en = "Enable processing server for 'HTML to PDF' tool ? (This can later be changed)"
    ask.fr = "Activer la fonctionnalité côté serveur pour l'outil 'HTML to PDF' ? (Cela pourra être changé plus tard)"

    [install.init_puppeteer-htmltopdf_permission]
    type = "group"
    default = "all_users"
    ask.en = "Who should have access to the processing server ? (This can later be changed)"
    ask.fr = "Qui peut accéder à la fonctionnalité côté serveur ? (Cela pourra être changé plus tard)"
    help.en = "Specific permission to access to server-side processing for the tool 'HTML to PDF'"
    help.fr = "Permission spécifique pour accéder au processus côté serveur de l'outil 'HTML to PDF'"
    visible = "enable_htmltopdf_server"

[resources]

    [resources.sources]

        [resources.sources.main]
        # This is not used as we are using git clone. It's only here for autoupdate.
        url = "https://github.com/sharevb/it-tools/archive/7b151188328dbfca39c70ac1a3036a1f1689cdd2.tar.gz"
        sha256 = "30afe30ab64fe0690cfe2cf318098d1f461ff8774fba4fb8a6f11fff6c85c829"
        prefetch = false
        autoupdate.strategy = "latest_github_commit"
        
        [resources.sources.ynh_build]
        url = "https://github.com/YunoHost-Apps/it-tools_ynh/releases/download/v2026.04.19-7b151188/it-tools_v2026.04.19-7b151188_ynh.zip"
        sha256 = "38e0827f3e4c1b4dcf8bc8cf70bdb9f65ff746d93d10daa495c255bb065d673b"
        format = "zip"
        extract = true
        in_subdir = true

        [resources.sources.puppeteer-htmltopdf]
        url = "https://github.com/sharevb/puppeteer-htmltopdf/archive/b7e74e81507d1f40d969213adba919b8ce584c8d.tar.gz"
        sha256 = "2cb6cd0ea315f9c96143ee2a852f2ef0588c1f5c3690749b43bb28242aed6f63"
        extract = true
        in_subdir = true
        autoupdate.strategy = "latest_github_commit"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"
    puppeteer-htmltopdf.url = "/pdf/url"
    puppeteer-htmltopdf.show_tile = false

    [resources.ports]

    [resources.apt]
    # Resources only required for url to html conversion feature https://github.com/sharevb/puppeteer-htmltopdf/blob/main/Dockerfile 
    packages = "chromium, chromium-common, chromium-driver, fonts-liberation, libasound2, libatk-bridge2.0-0, libatk1.0-0, libcups2, libdbus-1-3, libdrm2, libgbm1, libgtk-3-0, libnspr4, libnss3, libxcomposite1, libxdamage1, libxfixes3, libxrandr2, wget"

    [resources.nodejs]
    # Resources only required for url to html conversion feature https://github.com/sharevb/puppeteer-htmltopdf/blob/main/Dockerfile 
    version = "20"
